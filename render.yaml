services:
  - type: web
    name: backend
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: CORS_ORIGINS
        sync: false
      - key: TWO_CAPTCHA_API_KEY
        sync: false
      - key: CAPTCHA_API_KEY
        sync: false
